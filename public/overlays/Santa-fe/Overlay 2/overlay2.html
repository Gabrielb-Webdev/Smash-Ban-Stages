<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Overlay 2 - Step 7</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; background: transparent; font-family: 'Lato', sans-serif; }
  body { background: transparent; }

  .everything {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    padding: 0 80px;
  }

  .row-bar {
    width: 100%;
    max-width: 1680px;
    min-height: 180px;
    background: #16081f;
    border-radius: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 0 24px;
  }

  .row-bar::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 28px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
    pointer-events: none;
  }

  .name-area {
    flex: 1;
    min-width: 420px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 2;
  }

  .name-box {
    background: #100610;
    border: 2px solid #ad1b45;
    border-radius: 18px;
    padding: 12px 18px;
    color: #ffffff;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 0.6px;
    text-align: center;
    white-space: nowrap;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .name-box span {
    color: #f8b500;
  }

  .center-red {
    width: 420px;
    min-height: 160px;
    background: #ad1b45;
    border: 2px solid #ad1b45;
    border-radius: 24px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 34px;
    z-index: 2;
  }

  .triangle-container {
    position: absolute;
    top: -24px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 120px;
    z-index: 1;
  }

  .triangle-svg { width: 100%; height: 100%; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.35)); }

  .score-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 28px;
    position: relative;
    z-index: 2;
  }

  .score-number {
    font-size: 44px;
    font-weight: 900;
    color: #ffffff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    line-height: 1;
  }

  .score-divider {
    width: 2px;
    height: 50px;
    background: rgba(255,255,255,0.18);
    border-radius: 999px;
  }

  .row-pills {
    width: 100%;
    max-width: 1100px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .pills-left, .pills-right {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .pills-left { justify-content: flex-end; padding-right: 24px; }
  .pills-right { justify-content: flex-start; padding-left: 24px; }

  .pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #100610;
    border: 2px solid #ad1b45;
    border-radius: 999px;
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: 0.6px;
    white-space: nowrap;
  }

  .flag-img {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid rgba(255,255,255,0.2);
  }
</style>
</head>
<body>

<div class="everything">
  <div class="row-bar">
      <div class="name-area">
        <div class="name-box" id="ov-p1-name">RRT4/INC Nostradamus</div>
      </div>

      <div class="center-red">
        <div class="triangle-container">
          <svg class="triangle-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
            <polygon points="60,10 10,110 110,110" fill="#16081f" stroke="#ad1b45" stroke-width="4" />
          </svg>
        </div>
        <div class="score-container">
          <div class="score-number" id="ov-p1-score">1</div>
          <div class="score-divider"></div>
          <div class="score-number" id="ov-p2-score">2</div>
        </div>
      </div>

      <div class="name-area">
  </div>

  <div class="row-pills">
    <div class="pills-left">
      <div class="pill" id="ov-p1-twitter">He/him</div>
      <div class="pill" id="ov-p1-seed">SEED 2</div>
      <div class="pill" id="ov-p1-country"><img class="flag-img" src="https://flagcdn.com/w80/es.png" alt="">Esp</div>
    </div>
    <div class="pills-right">
      <div class="pill" id="ov-p2-twitter">He/him</div>
      <div class="pill" id="ov-p2-seed">SEED 1</div>
      <div class="pill" id="ov-p2-country"><img class="flag-img" src="https://flagcdn.com/w80/ar.png" alt="">Arg</div>
    </div>
  </div>
</div>

<script>
const CHANNEL = 'smash-scoreboard-v2';
let ch;
try { ch = new BroadcastChannel(CHANNEL); } catch (e) {}

function setText(id, text) {
  const el = document.getElementById(id);
  if (!el || text === undefined) return;
  el.textContent = text;
}

function setFlagPill(id, flagCode, countryLabel) {
  const el = document.getElementById(id);
  if (!el || countryLabel === undefined) return;
  const code = flagCode ? flagCode.toLowerCase() : 'xx';
  el.innerHTML = `<img class="flag-img" src="https://flagcdn.com/w80/${code}.png" alt="">${countryLabel}`;
}

function applyData(d) {
  if (!d) return;
  setText('ov-p1-name', d['p1-name'] || '');
  setText('ov-p1-score', d['p1-score'] !== undefined ? d['p1-score'] : '');
  setText('ov-p1-twitter', d['p1-twitter'] || '');
  setText('ov-p1-seed', d['p1-seed'] || '');
  setFlagPill('ov-p1-country', d['p1-flag'], d['p1-country'] || '');

  setText('ov-p2-name', d['p2-name'] || '');
  setText('ov-p2-score', d['p2-score'] !== undefined ? d['p2-score'] : '');
  setText('ov-p2-twitter', d['p2-twitter'] || '');
  setText('ov-p2-seed', d['p2-seed'] || '');
  setFlagPill('ov-p2-country', d['p2-flag'], d['p2-country'] || '');
}

if (ch) ch.onmessage = (e) => applyData(e.data);

window.addEventListener('storage', (e) => {
  if (e.key !== CHANNEL || !e.newValue) return;
  try { applyData(JSON.parse(e.newValue)); } catch (_) {}
});

try {
  const raw = localStorage.getItem(CHANNEL);
  if (raw) applyData(JSON.parse(raw));
} catch (_) {}
</script>

</body>
</html>
