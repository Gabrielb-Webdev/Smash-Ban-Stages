<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Overlay 2 - Step 9</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,900;1,900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; font-family: 'Lato', sans-serif; }
  body::before { content: ''; position: fixed; inset: 0; z-index: -1; }
  body.obs-mode::before { display: none; }

  .everything {
    position: absolute;
    top: 10%;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: none;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ══ FILA 1 ══ */
  .row-bar {
    position: relative;
    width: 100%;
    min-height: 300px;
  }

  /* Franja oscura con nombre */
  .bar-left, .bar-right {
    position: absolute;
    top: 10px;
    display: inline-flex;
    align-items: center;
    height: 160px;
    background: #16081f;
    padding: 0 50px;
    width: auto;
    max-width: calc(50% - 320px);
    overflow: hidden;
    white-space: nowrap;
  }
  .bar-left  { right: calc(50% + 260px); justify-content: flex-end; }
  .bar-right { left: calc(50% + 260px); justify-content: flex-start; }

  .center-group {
    position: absolute;
    left: 50%;
    top: 0;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    gap: 0;
    z-index: 1;
  }

  .player-name {
    font-size: 64px;
    font-weight: 900;
    color: #fff;
    white-space: nowrap;
  }
  .sponsor {
    color: #f8b500;
    margin-right: 10px;
    font-weight: 900;
  }
  .player-tag {
    color: #fff;
    white-space: nowrap;
    opacity: 0.95;
  }

  /* Score rojo a los lados del triángulo */
  .score-red {
    height: 180px;
    background: #ad1b45;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 60px;
    flex-shrink: 0;
  }

  .score {
    font-size: 128px;
    font-weight: 900;
    font-style: italic;
    color: #fff;
    line-height: 1;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
  }

  /* Triángulo central */
  .center-tri {
    height: 180px;
    background: #ad1b45;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    width: 140px;
  }

  .triangle-container {
    position: absolute;
    width: 320px;
    height: 320px;
    z-index: 2;
  }
  .triangle-svg { width: 100%; height: 100%; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4)); }

  /* ══ FILA 2: pills ══ */
  .row-pills {
    width: 100%;
    display: flex;
    align-items: center;
    margin-top: -75px;
  }

  .pills-left, .pills-right {
    display: flex;
    align-items: center;
    gap: 16px;
    flex: 1;
  }
  .pills-left  { justify-content: flex-end; padding-right: 32px; }
  .pills-right { justify-content: flex-start; padding-left: 32px; }

  /* gap alineado con score-red + triangle + score-red */
  .pills-center-gap { width: 760px; flex-shrink: 0; }

  .pill {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #0d0208;
    border: 3px solid #ad1b45;
    border-radius: 999px;
    padding: 18px 36px;
    font-size: 20px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .flag-img {
    width: 32px; height: 32px;
    border-radius: 50%; object-fit: cover;
    border: 1px solid rgba(255,255,255,0.2); flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="everything">

  <!-- FILA 1 -->
  <div class="row-bar">
    <div class="bar-left">
      <span class="player-name">
        <span class="sponsor" id="ov2-p1-sponsor">RRT4/INC</span>
        <span class="player-tag" id="ov2-p1-tag">Nostradamus</span>
      </span>
    </div>

    <div class="center-group">
      <!-- Score P1 -->
      <div class="score-red">
        <div class="score" id="ov2-p1-score">1</div>
      </div>

      <!-- Triángulo -->
      <div class="center-tri">
        <div class="triangle-container">
          <svg class="triangle-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
            <polygon points="60,10 10,110 110,110" fill="#16081f" stroke="#ad1b45" stroke-width="4"/>
          </svg>
        </div>
      </div>

      <!-- Score P2 -->
      <div class="score-red">
        <div class="score" id="ov2-p2-score">2</div>
      </div>
    </div>

    <div class="bar-right">
      <span class="player-name">
        <span class="sponsor" id="ov2-p2-sponsor">CBA</span>
        <span class="player-tag" id="ov2-p2-tag">Floripundo</span>
      </span>
    </div>
  </div>

  <!-- FILA 2: pills -->
  <div class="row-pills">
    <div class="pills-left">
      <div class="pill"><img class="flag-img" id="ov2-p1-flag" src="https://flagcdn.com/w80/es.png" alt="Esp"> <span id="ov2-p1-country">Esp</span></div>
      <div class="pill" id="ov2-p1-seed">SEED 2</div>
      <div class="pill" id="ov2-p1-pronouns" style="display:none"></div>
    </div>
    <div class="pills-center-gap"></div>
    <div class="pills-right">
      <div class="pill"><img class="flag-img" id="ov2-p2-flag" src="https://flagcdn.com/w80/ve.png" alt="Ven"> <span id="ov2-p2-country">Ven</span></div>
      <div class="pill" id="ov2-p2-seed">SEED 1</div>
      <div class="pill" id="ov2-p2-pronouns" style="display:none"></div>
    </div>
  </div>

</div>

<script>
const CHANNEL = 'smash-scoreboard-v2';
let ch;
try { ch = new BroadcastChannel(CHANNEL); } catch (e) {}

function setText(id, value) {
  const el = document.getElementById(id);
  if (el && value !== undefined) el.textContent = value;
}

function setSrc(id, value) {
  const el = document.getElementById(id);
  if (el && value !== undefined) {
    el.src = value;
    el.alt = value;
  }
}

function applyOverlay2Data(data) {
  function parseSponsorTag(value) {
    const split = value.split('|').map(str => str.trim()).filter(Boolean);
    if (split.length >= 2) {
      return { sponsor: split[0], tag: split.slice(1).join(' | ') };
    }
    return { sponsor: value.trim(), tag: '' };
  }

  if (data['p1-sponsor'] !== undefined) setText('ov2-p1-sponsor', data['p1-sponsor']);
  if (data['p1-tag'] !== undefined) setText('ov2-p1-tag', data['p1-tag']);
  if (data['p1-sponsor-color'] !== undefined) {
    const el = document.getElementById('ov2-p1-sponsor');
    if (el) el.style.color = data['p1-sponsor-color'] || '#f8b500';
  }
  if (data['p2-sponsor'] !== undefined) setText('ov2-p2-sponsor', data['p2-sponsor']);
  if (data['p2-tag'] !== undefined) setText('ov2-p2-tag', data['p2-tag']);
  if (data['p2-sponsor-color'] !== undefined) {
    const el = document.getElementById('ov2-p2-sponsor');
    if (el) el.style.color = data['p2-sponsor-color'] || '#f8b500';
  }
  if ((data['p1-sponsor'] === undefined || data['p1-sponsor'] === '') && (data['p1-tag'] === undefined || data['p1-tag'] === '') && data['p1-name'] !== undefined) {
    const parsed = parseSponsorTag(data['p1-name']);
    setText('ov2-p1-sponsor', parsed.sponsor);
    setText('ov2-p1-tag', parsed.tag);
  }
  if ((data['p2-sponsor'] === undefined || data['p2-sponsor'] === '') && (data['p2-tag'] === undefined || data['p2-tag'] === '') && data['p2-name'] !== undefined) {
    const parsed = parseSponsorTag(data['p2-name']);
    setText('ov2-p2-sponsor', parsed.sponsor);
    setText('ov2-p2-tag', parsed.tag);
  }
  if (data['p1-score'] !== undefined) setText('ov2-p1-score', data['p1-score']);
  if (data['p2-score'] !== undefined) setText('ov2-p2-score', data['p2-score']);
  if (data['p1-seed'] !== undefined) setText('ov2-p1-seed', data['p1-seed']);
  if (data['p2-seed'] !== undefined) setText('ov2-p2-seed', data['p2-seed']);
  if (data['p1-country'] !== undefined) setText('ov2-p1-country', data['p1-country']);
  if (data['p2-country'] !== undefined) setText('ov2-p2-country', data['p2-country']);
  if (data['p1-flag'] !== undefined) setSrc('ov2-p1-flag', data['p1-flag'] ? `https://flagcdn.com/w80/${data['p1-flag'].toLowerCase()}.png` : '');
  if (data['p2-flag'] !== undefined) setSrc('ov2-p2-flag', data['p2-flag'] ? `https://flagcdn.com/w80/${data['p2-flag'].toLowerCase()}.png` : '');
  if (data['p1-pronouns'] !== undefined) {
    const el = document.getElementById('ov2-p1-pronouns');
    if (el) { el.textContent = data['p1-pronouns']; el.style.display = data['p1-pronouns'] ? '' : 'none'; }
  }
  if (data['p2-pronouns'] !== undefined) {
    const el = document.getElementById('ov2-p2-pronouns');
    if (el) { el.textContent = data['p2-pronouns']; el.style.display = data['p2-pronouns'] ? '' : 'none'; }
  }
}

if (ch) ch.onmessage = e => applyOverlay2Data(e.data);

// Polling local (mismo navegador)
let lastRaw = '';
setInterval(() => {
  try {
    const raw = localStorage.getItem(CHANNEL);
    if (raw && raw !== lastRaw) {
      lastRaw = raw;
      applyOverlay2Data(JSON.parse(raw));
    }
  } catch (e) {}
}, 500);

try {
  const raw = localStorage.getItem(CHANNEL);
  if (raw) {
    lastRaw = raw;
    applyOverlay2Data(JSON.parse(raw));
  }
} catch (e) {}

// Polling al servidor para recibir desde otros navegadores / OBS / otras PCs
let lastServerHash = '';
async function pollServerState() {
  try {
    const res = await fetch('/api/santa-fe/overlay2-state', { cache: 'no-store' });
    if (!res.ok) return;
    const data = await res.json();
    if (!data || !Object.keys(data).length) return;
    const hash = JSON.stringify(data);
    if (hash === lastServerHash) return;
    lastServerHash = hash;
    applyOverlay2Data(data);
  } catch (e) {}
}
pollServerState();
setInterval(pollServerState, 500);
</script>

</body>
</html>
