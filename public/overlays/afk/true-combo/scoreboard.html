<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>True Combo · Scoreboard</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html { overflow:hidden; background:transparent; }
body {
  width:1280px; height:720px;
  overflow:hidden; background:transparent;
  position:relative; font-family:'DM Sans',sans-serif;
}

/* ── Scoreboard row (arriba, centrado) ── */
.sb-row {
  position:absolute; top:22px;
  left:50%; transform:translateX(-50%);
  display:flex; align-items:stretch;
  width:920px;
}

/* ── Player cards ── */
.pcard {
  flex:1;
  display:flex; flex-direction:column; gap:6px;
  background:linear-gradient(160deg, rgba(10,7,2,0.93) 0%, rgba(24,14,2,0.88) 100%);
  border:1.5px solid rgba(200,140,16,0.55);
  box-shadow:0 6px 28px rgba(0,0,0,0.8), inset 0 1px 0 rgba(240,168,24,0.1);
  padding:12px 16px; border-radius:5px;
}
.pcard.p1 { border-left:3px solid #f0a418; }
.pcard.p2 { text-align:right; border-right:3px solid #f0a418; }

.pcard .seed-lbl {
  font-size:8px; letter-spacing:2px; text-transform:uppercase;
  color:rgba(240,164,24,0.45); min-height:11px;
}
.pcard .ptag {
  font-family:'Anton',sans-serif; font-size:26px; letter-spacing:2px;
  color:#f5e8a0; text-transform:uppercase; line-height:1.1;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.pcard .char-row {
  display:flex; align-items:center; gap:7px; min-height:22px;
}
.pcard.p2 .char-row { flex-direction:row-reverse; }
.pcard .char-ico {
  width:24px; height:24px; border-radius:50%; object-fit:cover;
  border:1.5px solid rgba(240,164,24,0.4); background:rgba(0,0,0,0.5);
  display:none; flex-shrink:0;
}
.pcard .pchar {
  font-size:10px; letter-spacing:1.5px; text-transform:uppercase;
  color:rgba(240,164,24,0.65);
}
.pcard .pips { display:flex; gap:5px; margin-top:4px; }
.pcard.p2 .pips { justify-content:flex-end; }
.pip {
  width:12px; height:12px; border-radius:50%;
  border:1.5px solid rgba(240,164,24,0.4); transition:background .2s, box-shadow .2s;
}
.pip.fill { background:#f0a418; box-shadow:0 0 7px rgba(240,164,24,0.8); border-color:#f0a418; }

/* ── Center score ── */
.center-score {
  width:200px; flex-shrink:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:4px; padding:10px 8px;
  pointer-events:none;
}
.round-lbl {
  font-size:9px; letter-spacing:3px; text-transform:uppercase;
  color:rgba(240,164,24,0.75);
  background:rgba(0,0,0,0.65); padding:3px 14px; border-radius:3px;
  white-space:nowrap;
}
.score-row { display:flex; align-items:center; gap:10px; }
.snum {
  font-family:'Anton',sans-serif; font-size:72px; line-height:1;
  color:#f0a418; min-width:54px; text-align:center;
  text-shadow: -2px -2px 0 #7a2800, 2px -2px 0 #7a2800,
               -2px  2px 0 #7a2800, 2px  2px 0 #7a2800,
               0 0 30px rgba(180,80,0,0.5);
  transition:color .2s, text-shadow .2s;
}
.snum.lead {
  color:#ffd060;
  text-shadow: -2px -2px 0 #883000, 2px -2px 0 #883000,
               -2px  2px 0 #883000, 2px  2px 0 #883000,
               0 0 45px rgba(255,190,0,0.85);
}
.sdot { font-family:'Anton',sans-serif; font-size:30px; color:rgba(240,164,24,0.25); }
.game-lbl {
  font-size:8px; letter-spacing:2px; text-transform:uppercase;
  color:rgba(240,164,24,0.45);
}

/* ── Banner image ── */
.tc-banner {
  position:absolute; bottom:0; left:0; right:0;
  height:205px; overflow:hidden;
}
.tc-banner img {
  width:100%; height:100%;
  object-fit:cover; object-position:center 38%;
  display:block;
}
/* CSS fallback bar when image is missing */
.tc-banner::before {
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(180deg,
    transparent 0%,
    rgba(140,80,0,0.15) 35%,
    rgba(200,130,10,0.25) 50%,
    rgba(140,80,0,0.15) 65%,
    transparent 100%);
  pointer-events:none;
}
</style>
</head>
<body>

<!-- Scoreboard row: arriba, centrado -->
<div class="sb-row">

  <!-- P1 card -->
  <div class="pcard p1">
    <div class="seed-lbl" id="p1-seed-lbl"></div>
    <div class="ptag" id="p1-tag">PLAYER 1</div>
    <div class="char-row">
      <img class="char-ico" id="p1-ico" src="" alt="">
      <div class="pchar" id="p1-char"></div>
    </div>
    <div class="pips" id="p1-pips"></div>
  </div>

  <!-- Center score -->
  <div class="center-score">
    <div class="round-lbl" id="round-el">Winners Finals</div>
    <div class="score-row">
      <div class="snum" id="s1">0</div>
      <div class="sdot">:</div>
      <div class="snum" id="s2">0</div>
    </div>
    <div class="game-lbl" id="game-lbl">GAME 1 · Bo5</div>
  </div>

  <!-- P2 card -->
  <div class="pcard p2">
    <div class="seed-lbl" id="p2-seed-lbl"></div>
    <div class="ptag" id="p2-tag">PLAYER 2</div>
    <div class="char-row">
      <img class="char-ico" id="p2-ico" src="" alt="">
      <div class="pchar" id="p2-char"></div>
    </div>
    <div class="pips" id="p2-pips"></div>
  </div>

</div>

<!-- True Combo banner image -->
<div class="tc-banner">
  <img src="./img/banner.png" alt="True Combo" onerror="this.style.opacity='0'">
</div>

<script>
!function(){function s(){var r=Math.min(window.innerWidth/1280,window.innerHeight/720);document.body.style.transform='scale('+r+')';document.body.style.transformOrigin='top left';}s();window.addEventListener('resize',s);}();

function load() {
  try {
    const d = JSON.parse(localStorage.getItem('smashafk_score')||'{}');
    const p1s = d.p1score||0, p2s = d.p2score||0, needed = d.needed||3;

    document.getElementById('p1-tag').textContent = (d.p1tag||'PLAYER 1').toUpperCase();
    document.getElementById('p2-tag').textContent = (d.p2tag||'PLAYER 2').toUpperCase();
    document.getElementById('p1-char').textContent = d.p1char||'';
    document.getElementById('p2-char').textContent = d.p2char||'';

    const s1 = document.getElementById('s1'), s2 = document.getElementById('s2');
    s1.textContent = p1s; s2.textContent = p2s;
    s1.className = 'snum'+(p1s > p2s ? ' lead' : '');
    s2.className = 'snum'+(p2s > p1s ? ' lead' : '');

    document.getElementById('round-el').textContent = d.round||'Winners Finals';
    const g = Math.min(p1s + p2s + 1, d.format||5);
    document.getElementById('game-lbl').textContent = 'GAME '+g+' · Bo'+(d.format||5);

    ['p1','p2'].forEach(p => {
      const score = p === 'p1' ? p1s : p2s;
      const pip = document.getElementById(p+'-pips');
      pip.innerHTML = '';
      for (let i = 0; i < needed; i++) {
        const el = document.createElement('div');
        el.className = 'pip' + (i < score ? ' fill' : '');
        pip.appendChild(el);
      }
      const ico = document.getElementById(p+'-ico');
      const url = p === 'p1' ? d.p1charIcon : d.p2charIcon;
      ico.src = url||''; ico.style.display = url ? 'inline-block' : 'none';

      const seed = d[p+'seed']||'';
      document.getElementById(p+'-seed-lbl').textContent = seed ? 'Seed '+seed : '';
    });
  } catch(e) {}
}
load(); setInterval(load, 300); window.addEventListener('storage', load);
</script>
</body>
</html>
