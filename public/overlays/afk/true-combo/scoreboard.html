<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>True Combo · Scoreboard</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html { overflow:hidden; background:transparent; }
body {
  width:1280px; height:720px;
  overflow:hidden; background:transparent;
  position:relative; font-family:'DM Sans',sans-serif;
}

/* ── Banner container ── */
.banner {
  position:absolute; top:0; left:0; right:0; height:185px;
  overflow:visible;
}
.banner-img {
  position:absolute; top:0; left:0; width:100%; height:100%;
  object-fit:fill; pointer-events:none; user-select:none;
}
.banner > *:not(.banner-img) { position:absolute; }

/* ── Score numbers (outer tabs) ── */
.snum {
  font-family:'Anton', sans-serif;
  font-size:74px; line-height:1;
  text-align:center;
  width:88px; top:22px;
  color:#f0a418;
  text-shadow:
    -2px -2px 0 #7a2800, 2px -2px 0 #7a2800,
    -2px  2px 0 #7a2800, 2px  2px 0 #7a2800,
    0 0 30px rgba(180,80,0,0.55);
  transition:color .25s, text-shadow .25s;
}
#s1 { left:0; }
#s2 { right:0; }
.snum.lead {
  color:#ffe040;
  text-shadow:
    -2px -2px 0 #883000, 2px -2px 0 #883000,
    -2px  2px 0 #883000, 2px  2px 0 #883000,
    0 0 50px rgba(255,195,0,0.95);
}

/* ── Player areas (sobre las franjas naranjas) ── */
.p1-area {
  left:92px; top:15px; width:348px;
  display:flex; align-items:flex-start; gap:10px;
}
.p2-area {
  right:92px; top:15px; width:348px;
  display:flex; align-items:flex-start; gap:10px;
  flex-direction:row-reverse;
}
.char-ico {
  width:50px; height:50px; border-radius:50%; object-fit:cover;
  border:2.5px solid rgba(40,15,0,0.5);
  background:rgba(0,0,0,0.25);
  flex-shrink:0; display:none;
  box-shadow:0 2px 8px rgba(0,0,0,0.5);
  margin-top:4px;
}
.player-info { min-width:0; overflow:hidden; flex:1; }
.player-info.right { text-align:right; }
.ptag {
  font-family:'Anton', sans-serif;
  font-size:30px; letter-spacing:1px;
  color:#1c0800; text-transform:uppercase; line-height:1.1;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  text-shadow:0 1px 0 rgba(255,200,80,0.35);
}
.pchar {
  font-size:11px; letter-spacing:1px; text-transform:uppercase;
  color:rgba(35,10,0,0.7); font-weight:700; line-height:1.3;
  margin-top:2px;
}
.pips { display:flex; gap:5px; margin-top:6px; }
.pips.right { justify-content:flex-end; }
.pip {
  width:14px; height:14px; border-radius:50%;
  border:2px solid rgba(50,18,0,0.45);
  background:rgba(0,0,0,0.18);
  transition:background .2s, box-shadow .2s;
}
.pip.fill {
  background:#1c0800;
  border-color:#1c0800;
  box-shadow:0 0 4px rgba(0,0,0,0.45);
}

/* ── Info strip (franja negra inferior, cada lado) ── */
.info-left {
  left:96px; bottom:16px;
  font-family:'Anton', sans-serif;
  font-size:13px; letter-spacing:2px; text-transform:uppercase;
  color:rgba(255,218,80,0.92); white-space:nowrap;
}
.info-right {
  right:96px; bottom:16px;
  font-family:'Anton', sans-serif;
  font-size:13px; letter-spacing:2px; text-transform:uppercase;
  color:rgba(255,218,80,0.92); white-space:nowrap;
  text-align:right;
}
</style>
</head>
<body>

<div class="banner">
  <!-- Imagen base del banner -->
  <img class="banner-img" src="../TrueBanner2.png" alt="">

  <!-- Score P1 (tab izquierdo) -->
  <div class="snum" id="s1">0</div>

  <!-- Área jugador 1 (franja naranja izquierda) -->
  <div class="p1-area">
    <img class="char-ico" id="p1-ico" src="" alt="">
    <div class="player-info">
      <div class="ptag" id="p1-tag">PLAYER 1</div>
      <div class="pchar" id="p1-char"></div>
      <div class="pips" id="p1-pips"></div>
    </div>
  </div>

  <!-- Área jugador 2 (franja naranja derecha) -->
  <div class="p2-area">
    <img class="char-ico" id="p2-ico" src="" alt="">
    <div class="player-info right">
      <div class="ptag" id="p2-tag">PLAYER 2</div>
      <div class="pchar" id="p2-char"></div>
      <div class="pips right" id="p2-pips"></div>
    </div>
  </div>

  <!-- Score P2 (tab derecho) -->
  <div class="snum" id="s2">0</div>

  <!-- Franja negra inferior: Round izquierda · Game+Formato derecha -->
  <div class="info-left" id="round-el"></div>
  <div class="info-right" id="game-lbl">GAME 1 · Bo3</div>
</div>

<script>
/* Escalar body al tamaño de ventana (OBS) */
!function(){function s(){var r=Math.min(window.innerWidth/1280,window.innerHeight/720);document.body.style.transform='scale('+r+')';document.body.style.transformOrigin='top left';}s();window.addEventListener('resize',s);}();

const API = 'https://smash-ban-stages.vercel.app/api/afk/score-state';

async function load() {
  let d = {};
  try {
    const r = await fetch(API);
    if (r.ok) { const j = await r.json(); if (j && (j.p1tag !== undefined || j.p2tag !== undefined)) d = j; }
  } catch {}
  if (!d.p1tag && !d.p2tag) {
    try { d = JSON.parse(localStorage.getItem('smashafk_score')||'{}'); } catch {}
  }
  try {
    const p1s = d.p1score||0, p2s = d.p2score||0, needed = d.needed||3;

    document.getElementById('p1-tag').textContent = (d.p1tag||'PLAYER 1').toUpperCase();
    document.getElementById('p2-tag').textContent = (d.p2tag||'PLAYER 2').toUpperCase();
    document.getElementById('p1-char').textContent = d.p1char||'';
    document.getElementById('p2-char').textContent = d.p2char||'';

    const s1 = document.getElementById('s1'), s2 = document.getElementById('s2');
    s1.textContent = p1s; s2.textContent = p2s;
    s1.className = 'snum'+(p1s > p2s ? ' lead' : '');
    s2.className = 'snum'+(p2s > p1s ? ' lead' : '');

    document.getElementById('round-el').textContent = d.round||'';
    const fmt = d.format||3;
    const g = Math.min(p1s + p2s + 1, fmt);
    document.getElementById('game-lbl').textContent = 'GAME\u00a0'+g+'\u00a0\u00b7\u00a0Bo'+fmt;

    ['p1','p2'].forEach(p => {
      const score = p === 'p1' ? p1s : p2s;
      const pip = document.getElementById(p+'-pips');
      pip.innerHTML = '';
      for (let i = 0; i < needed; i++) {
        const el = document.createElement('div');
        el.className = 'pip' + (i < score ? ' fill' : '');
        pip.appendChild(el);
      }
      const ico = document.getElementById(p+'-ico');
      const url = p === 'p1' ? d.p1charIcon : d.p2charIcon;
      ico.src = url||''; ico.style.display = url ? 'inline-block' : 'none';
    });
  } catch(e) {}
}
load(); setInterval(load, 500); window.addEventListener('storage', load);
</script>
</body>
</html>
