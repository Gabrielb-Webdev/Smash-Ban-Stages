<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>True Combo · Control</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0a0700;
  --surf:   #130e02;
  --surf2:  #1c1503;
  --border: rgba(240,164,24,0.1);
  --text:   #f5e8c0;
  --dim:    rgba(200,170,80,0.45);
  --gold:   #f0a418;
  --red:    #cc2200;
  --green:  #78d860;
  --yellow: #ffd060;
}
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }

/* ── Header ── */
header {
  display:flex; align-items:center; gap:12px;
  padding:11px 20px;
  background:var(--surf); border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:10;
}
header .logo { display:flex; flex-direction:column; }
header h1 { font-family:'Anton',sans-serif; font-size:18px; letter-spacing:4px; color:var(--gold); }
header .sub { font-size:8px; letter-spacing:3px; color:var(--dim); text-transform:uppercase; }
.live-row { display:flex; align-items:center; gap:6px; margin-left:auto; }
.live-dot { width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 7px var(--green); animation:pulse 2s infinite; }
.live-lbl { font-size:9px; letter-spacing:2px; color:var(--green); text-transform:uppercase; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }

/* ── Grid ── */
.grid {
  display:grid; grid-template-columns:1fr 270px 1fr;
  gap:1px; background:var(--border);
  min-height:calc(100vh - 50px - 52px);
}
.panel { background:var(--bg); padding:16px 14px; display:flex; flex-direction:column; gap:11px; }
.center { background:var(--surf); padding:16px 14px; display:flex; flex-direction:column; gap:11px; }
.plbl { font-size:8px; letter-spacing:3px; text-transform:uppercase; color:var(--dim); }
.plbl.p1 { color:rgba(220,80,40,.6); }
.plbl.p2 { color:rgba(80,160,230,.6); text-align:right; }

/* ── Inputs ── */
label { display:block; font-size:8px; letter-spacing:1.5px; text-transform:uppercase; color:var(--dim); margin-bottom:4px; }
input[type=text] {
  width:100%; background:var(--surf); border:1px solid var(--border);
  color:var(--text); padding:7px 11px; border-radius:5px;
  font-family:'DM Sans',sans-serif; font-size:13px; outline:none; transition:border-color .15s;
}
input[type=text]:focus { border-color:var(--gold); }

/* ── Preview card ── */
.preview-card {
  background:var(--surf); border:1px solid var(--border); border-radius:8px;
  padding:10px 12px; display:flex; align-items:center; gap:10px;
}
.preview-card.p2 { flex-direction:row-reverse; }
.pname { font-family:'Anton',sans-serif; font-size:18px; letter-spacing:2px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.pname.right { text-align:right; }
.pscore { font-family:'Anton',sans-serif; font-size:38px; color:var(--gold); line-height:1; }
.preview-ico { width:38px; height:38px; border-radius:50%; object-fit:cover; border:2px solid rgba(240,164,24,.35); background:rgba(0,0,0,.5); display:none; }

/* ── Char button ── */
.char-btn {
  width:100%; background:var(--surf); border:1px solid var(--border);
  border-radius:7px; padding:8px 11px; cursor:pointer; color:var(--text);
  font-family:'DM Sans',sans-serif; font-size:12px;
  display:flex; align-items:center; gap:8px; transition:border-color .15s; text-align:left;
}
.char-btn:hover { border-color:var(--gold); }
.char-btn .btn-ico { width:28px; height:28px; border-radius:50%; object-fit:cover; border:1.5px solid rgba(240,164,24,.35); background:rgba(0,0,0,.5); display:none; }
.btn-lbl { flex:1; }
.dim { color:var(--dim); }
.clear-x { font-size:10px; color:var(--dim); background:none; border:none; cursor:pointer; padding:2px 4px; border-radius:3px; }
.clear-x:hover { color:var(--red); }

/* ── Skin row ── */
.skin-row { display:flex; gap:5px; flex-wrap:wrap; min-height:26px; }
.skin-btn { width:28px; height:28px; border-radius:50%; border:2px solid transparent; cursor:pointer; padding:2px; background:none; opacity:.55; transition:transform .1s,border-color .1s,opacity .1s; }
.skin-btn img { width:100%; height:100%; border-radius:50%; object-fit:cover; display:block; }
.skin-btn:hover { opacity:1; transform:scale(1.12); }
.skin-btn.active { border-color:var(--yellow); opacity:1; }

/* ── Score ── */
.score-nums { font-family:'Anton',sans-serif; font-size:72px; display:flex; align-items:center; justify-content:center; gap:10px; line-height:1; }
.sn { min-width:44px; text-align:center; color:var(--dim); transition:color .2s; }
.sn.lead { color:var(--yellow); }
.sdash { font-size:26px; color:rgba(240,164,24,.15); }
.score-grid { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:4px; }
.sbtn {
  padding:9px 4px; border-radius:6px; cursor:pointer;
  font-family:'Anton',sans-serif; font-size:15px; letter-spacing:.5px;
  border:1px solid var(--border); background:var(--surf); color:var(--text);
  transition:background .1s, transform .1s; text-align:center;
}
.sbtn:hover { background:var(--surf2); }
.sbtn:active { transform:scale(.94); }
.sbtn.add { color:var(--green); border-color:rgba(120,216,96,.2); }
.sbtn.sub { color:var(--red); border-color:rgba(200,34,0,.2); }

/* ── Format ── */
.fmt-row { display:flex; gap:4px; }
.fmt-btn {
  flex:1; padding:6px 2px; border-radius:5px; border:1px solid var(--border);
  background:var(--bg); color:var(--dim); font-family:'Anton',sans-serif;
  font-size:12px; letter-spacing:1px; cursor:pointer; text-align:center; transition:all .15s;
}
.fmt-btn:hover,.fmt-btn.active { border-color:var(--gold); color:var(--gold); background:rgba(240,164,24,.07); }

/* ── Game chip ── */
.game-chip {
  text-align:center; padding:9px; background:var(--bg); border-radius:7px;
  border:1px solid var(--border);
}
.game-chip .glbl { font-size:7px; letter-spacing:2px; text-transform:uppercase; color:var(--dim); margin-bottom:2px; }
.game-chip .gval { font-family:'Anton',sans-serif; font-size:19px; color:var(--gold); letter-spacing:2px; }

/* ── Reset btn ── */
.btn-reset {
  padding:8px; border-radius:6px; border:1px solid rgba(240,164,24,.18);
  background:rgba(240,164,24,.04); color:var(--gold);
  font-family:'DM Sans',sans-serif; font-size:11px; font-weight:600;
  cursor:pointer; width:100%; transition:background .15s;
}
.btn-reset:hover { background:rgba(240,164,24,.1); }

/* ── Footer ── */
footer {
  background:var(--surf); border-top:1px solid var(--border);
  padding:11px 20px; display:flex; align-items:center; gap:7px; flex-wrap:wrap;
}
footer .flbl { font-size:8px; letter-spacing:2px; text-transform:uppercase; color:var(--dim); margin-right:2px; }
footer a {
  display:inline-flex; align-items:center; gap:4px;
  padding:5px 12px; border-radius:18px; border:1px solid var(--border);
  background:var(--bg); color:var(--text); text-decoration:none;
  font-size:11px; font-weight:500; transition:all .15s; white-space:nowrap;
}
footer a:hover { border-color:var(--gold); color:var(--gold); }
footer a.afk { opacity:.5; font-size:10px; }
footer a.afk:hover { opacity:1; }
.btn-reset-all {
  margin-left:auto; padding:5px 14px; border-radius:18px;
  border:1px solid rgba(200,34,0,.3); background:rgba(200,34,0,.07);
  color:var(--red); font-size:10px; font-weight:600; cursor:pointer; transition:all .15s;
}
.btn-reset-all:hover { background:rgba(200,34,0,.18); }

/* ── Modal ── */
.modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.85); backdrop-filter:blur(7px); z-index:100; display:none; align-items:center; justify-content:center; }
.modal-bg.open { display:flex; }
.modal-box { background:var(--surf); border:1px solid rgba(240,164,24,.25); border-radius:12px; padding:16px; width:min(540px,93vw); max-height:82vh; display:flex; flex-direction:column; gap:9px; }
.modal-head { display:flex; align-items:center; gap:9px; }
.modal-title { font-family:'Anton',sans-serif; font-size:16px; letter-spacing:2px; color:var(--gold); flex:1; }
.modal-close { width:26px; height:26px; border-radius:50%; border:1px solid var(--border); background:none; color:var(--dim); cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; }
.modal-search { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:7px 11px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:12px; outline:none; }
.modal-search:focus { border-color:var(--gold); }
.char-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:4px; overflow-y:auto; flex:1; padding-right:3px; }
.char-grid::-webkit-scrollbar { width:3px; }
.char-grid::-webkit-scrollbar-thumb { background:rgba(240,164,24,.2); border-radius:2px; }
.char-item { display:flex; flex-direction:column; align-items:center; gap:2px; padding:6px 3px; border-radius:7px; cursor:pointer; border:1px solid transparent; transition:all .1s; background:var(--bg); }
.char-item:hover { border-color:rgba(240,164,24,.3); background:var(--surf2); }
.char-item.sel { border-color:var(--yellow); background:rgba(240,164,24,.07); }
.char-item img { width:46px; height:46px; object-fit:contain; filter:drop-shadow(0 2px 4px #000a); }
.char-item span { font-size:7px; text-align:center; color:var(--dim); line-height:1.2; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <h1>TRUE COMBO</h1>
    <div class="sub">Overlay Control</div>
  </div>
  <div class="live-row">

  </div>
</header>

<div class="grid">
  <!-- ═══ P1 ═══ -->
  <div class="panel">
    <div class="plbl p1">◀ JUGADOR 1</div>
    <div class="preview-card">
      <img class="preview-ico" id="p1-prev-ico" src="" alt="">
      <div class="pname" id="p1-prev-name">—</div>
      <div class="pscore" id="p1-prev-score">0</div>
    </div>
    <div>
      <label>Nombre</label>
      <input type="text" id="p1-name" placeholder="Ej: Luii2204" oninput="S.p1tag=this.value;save()">
    </div>
    <div>
      <button class="char-btn" onclick="openPicker('p1')">

    </div>
    <div>

    </div>
  </div>

  <!-- ═══ CENTER ═══ -->
  <div class="center">
    <div class="plbl" style="text-align:center">MATCH</div>
    <div>
      <label>Ronda</label>
      <input type="text" id="round-inp" placeholder="Winners Finals" oninput="S.round=this.value;save()">
    </div>
    <div>
      <label>Stage</label>
      <input type="text" id="stage-inp" placeholder="Final Destination" oninput="S.stage=this.value;save()">
    </div>
    <div>
      <label>Formato</label>
      <div class="fmt-row">
        <button class="fmt-btn" data-f="3" onclick="setFormat(3)">Bo3</button>
        <button class="fmt-btn active" data-f="5" onclick="setFormat(5)">Bo5</button>
        <button class="fmt-btn" data-f="7" onclick="setFormat(7)">Bo7</button>
      </div>
    </div>
    <div class="score-nums">
      <div class="sn" id="sc1">0</div>
      <div class="sdash">—</div>
      <div class="sn" id="sc2">0</div>
    </div>
    <div class="score-grid">
      <button class="sbtn add" onclick="addScore('p1')">P1 +1</button>
      <button class="sbtn sub" onclick="subScore('p1')">P1 −1</button>
      <button class="sbtn sub" onclick="subScore('p2')">P2 −1</button>
      <button class="sbtn add" onclick="addScore('p2')">P2 +1</button>
    </div>
    <div class="game-chip">
      <div class="glbl">Juego actual</div>
      <div class="gval" id="gval">Game 1 · Bo5</div>
    </div>
    <button class="btn-reset" onclick="resetScores()">↺ Resetear scores</button>
  </div>

  <!-- ═══ P2 ═══ -->
  <div class="panel">
    <div class="plbl p2">JUGADOR 2 ▶</div>
    <div class="preview-card p2">
      <img class="preview-ico" id="p2-prev-ico" src="" alt="">
      <div class="pname right" id="p2-prev-name">—</div>
      <div class="pscore" id="p2-prev-score">0</div>
    </div>
    <div>
      <label>Nombre</label>
      <input type="text" id="p2-name" placeholder="Ej: GabrielSinII" oninput="S.p2tag=this.value;save()">
    </div>
    <div>
      <button class="char-btn" onclick="openPicker('p2')">
        <img class="btn-ico" id="p2-btn-ico" src="" alt="">
        <span class="btn-lbl" id="p2-btn-lbl"><span class="dim">Seleccionar personaje...</span></span>
        <button class="clear-x" id="p2-clr" onclick="clearChar(event,'p2')" style="display:none">✕</button>
      </button>
      <div class="skin-row" id="p2-skins"></div>
    </div>
    <div>
      <label>Seed</label>
      <input type="text" id="p2-seed" placeholder="Ej: #5" oninput="S.p2seed=this.value;save()">
    </div>
  </div>
</div>

<footer>
  <span class="flbl">True Combo:</span>
  <a href="scoreboard.html" target="_blank">Scoreboard</a>
  <a href="player-intro.html" target="_blank">Intro</a>
  <a href="lowerthird.html" target="_blank">Lower Third</a>
  <a href="winner.html" target="_blank">Ganador</a>

<!-- Modal picker -->
<div class="modal-bg" id="char-modal">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-title" id="modal-ttl">PERSONAJE</div>

<script>

const ICON_OVERRIDE = {'rob':'Rob','pac-man':'Pac Man'};
const API = 'https://smash-ban-stages.vercel.app/api/afk/score-state';

function stockIcon(id, skin) {
  const c = CHARS.find(x => x[0] === id);
  if (!c) return '';
  const folder = ICON_OVERRIDE[id] || c[1]
    .replace(/\./g,'').replace(/\//g,' & ')
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
  const max = c[3]||8;
  const idx = Math.max(1, Math.min(parseInt(skin)||1, max));
  // Detecta si se sirve desde Live Server (/public/ prefix) o Next.js/Vercel (sin prefix)
  const pfx = location.pathname.startsWith('/public/') ? '/public' : '';
  return pfx+'/images/Stock%20Icons%20V2/'+encodeURIComponent(folder)+'/'+idx+'.png';
}

let S = {
  p1tag:'', p2tag:'',
  p1score:0, p2score:0,
  p1charId:null, p1skin:1,
  p2charId:null, p2skin:1,
  p1seed:'', p2seed:'',
  round:'', stage:'', format:5
};
let pickerTarget = null, filtered = CHARS;

function save() {
  const c1 = CHARS.find(x=>x[0]===S.p1charId);
  const c2 = CHARS.find(x=>x[0]===S.p2charId);
  const payload = {
    p1tag:S.p1tag, p2tag:S.p2tag,
    p1score:S.p1score, p2score:S.p2score,
    p1char:c1?c1[1]:'', p2char:c2?c2[1]:'',
    p1charIcon:S.p1charId?stockIcon(S.p1charId,S.p1skin):'',
    p2charIcon:S.p2charId?stockIcon(S.p2charId,S.p2skin):'',
    round:S.round, stage:S.stage,
    format:S.format, needed:Math.ceil(S.format/2),
    p1seed:S.p1seed, p2seed:S.p2seed,
  };
  localStorage.setItem('smashafk_score', JSON.stringify(payload));
  localStorage.setItem('smashafk_ctrl', JSON.stringify({p1charId:S.p1charId,p1skin:S.p1skin,p2charId:S.p2charId,p2skin:S.p2skin}));
  fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)}).catch(()=>{});
  render();
}

async function loadFromStorage() {
  try {
    const r = await fetch(API);
    if (r.ok) {
      const d = await r.json();
      if (d && (d.p1tag !== undefined || d.p2tag !== undefined)) {
        Object.assign(S, {p1tag:d.p1tag||'',p2tag:d.p2tag||'',p1score:d.p1score||0,p2score:d.p2score||0,round:d.round||'',stage:d.stage||'',format:d.format||5,p1seed:d.p1seed||'',p2seed:d.p2seed||''});
      }
    }
  } catch(e) {}
  try {
    const d = JSON.parse(localStorage.getItem('smashafk_score')||'{}');
    if (!S.p1tag && !S.p2tag) Object.assign(S, {p1tag:d.p1tag||'',p2tag:d.p2tag||'',p1score:d.p1score||0,p2score:d.p2score||0,round:d.round||'',stage:d.stage||'',format:d.format||5,p1seed:d.p1seed||'',p2seed:d.p2seed||''});
  } catch(e) {}
  try {
    const c = JSON.parse(localStorage.getItem('smashafk_ctrl')||'{}');
    if (c.p1charId) { S.p1charId=c.p1charId; S.p1skin=c.p1skin||1; }
    if (c.p2charId) { S.p2charId=c.p2charId; S.p2skin=c.p2skin||1; }
  } catch(e) {}
}

function addScore(p) { S[p+'score']=Math.min(S[p+'score']+1,Math.ceil(S.format/2)); save(); }
function subScore(p) { S[p+'score']=Math.max(0,S[p+'score']-1); save(); }
function resetScores() { S.p1score=0; S.p2score=0; save(); }
function setFormat(n) { S.format=n; document.querySelectorAll('.fmt-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.f)===n)); save(); }

function resetAll() {
  if (!confirm('¿Resetear todo?')) return;
  S={p1tag:'',p2tag:'',p1score:0,p2score:0,p1charId:null,p1skin:1,p2charId:null,p2skin:1,p1seed:'',p2seed:'',round:'',stage:'',format:5};
  localStorage.removeItem('smashafk_score'); localStorage.removeItem('smashafk_ctrl');
  ['p1-name','p2-name','round-inp','stage-inp','p1-seed','p2-seed'].forEach(id=>{document.getElementById(id).value='';});
  document.querySelectorAll('.fmt-btn').forEach(b=>b.classList.toggle('active',b.dataset.f==='5'));
  render();
}

function openPicker(p) {
  pickerTarget=p; filtered=CHARS;
  document.getElementById('modal-ttl').textContent=(p==='p1'?'J1':'J2')+' · PERSONAJE';
  document.getElementById('modal-q').value='';
  document.getElementById('char-modal').classList.add('open');
  renderGrid(); document.getElementById('modal-q').focus();
}
function closePicker() { document.getElementById('char-modal').classList.remove('open'); pickerTarget=null; }
function filterChars(q) { filtered=q?CHARS.filter(c=>c[1].toLowerCase().includes(q.toLowerCase())):CHARS; renderGrid(); }
function renderGrid() {
  const sel=pickerTarget?S[pickerTarget+'charId']:null;
  document.getElementById('char-grid').innerHTML=filtered.map(c=>
    `<div class="char-item${c[0]===sel?' sel':''}" onclick="selectChar('${c[0]}')">
      <img src="${stockIcon(c[0],1)}" alt="${c[1]}" onerror="this.style.opacity='.15'">
      <span>${c[1]}</span></div>`
  ).join('');
}
function selectChar(id) { if(!pickerTarget)return; S[pickerTarget+'charId']=id; S[pickerTarget+'skin']=1; save(); closePicker(); }
function clearChar(e,p) { e.stopPropagation(); S[p+'charId']=null; S[p+'skin']=1; save(); }
function selectSkin(p,skin) { S[p+'skin']=skin; save(); }

function renderSkins(p) {
  const el=document.getElementById(p+'-skins'), id=S[p+'charId'];
  if(!id){el.innerHTML='';return;}
  const c=CHARS.find(x=>x[0]===id); if(!c){el.innerHTML='';return;}
  const count=c[3]||8, cur=S[p+'skin']||1;
  el.innerHTML=Array.from({length:count},(_,i)=>{const n=i+1;return `<button class="skin-btn${n===cur?' active':''}" onclick="selectSkin('${p}',${n})" title="Skin ${n}"><img src="${stockIcon(id,n)}" alt="" onerror="this.style.opacity='.15'"></button>`;}).join('');
}

function render() {
  const p1s=S.p1score, p2s=S.p2score;
  const sc1=document.getElementById('sc1'), sc2=document.getElementById('sc2');
  sc1.textContent=p1s; sc1.className='sn'+(p1s>p2s?' lead':'');
  sc2.textContent=p2s; sc2.className='sn'+(p2s>p1s?' lead':'');
  const g=Math.min(p1s+p2s+1,S.format);
  document.getElementById('gval').textContent='Game '+g+' · Bo'+S.format;
  ['p1','p2'].forEach(p=>{
    const c=CHARS.find(x=>x[0]===S[p+'charId']), skin=S[p+'skin']||1, ps=S[p+'score'];
    document.getElementById(p+'-prev-name').textContent=S[p+'tag']||'—';
    document.getElementById(p+'-prev-score').textContent=ps;
    const pico=document.getElementById(p+'-prev-ico');
    if(c){pico.src=stockIcon(c[0],skin);pico.style.display='inline-block';}else{pico.src='';pico.style.display='none';}
    const bico=document.getElementById(p+'-btn-ico'), blbl=document.getElementById(p+'-btn-lbl'), clr=document.getElementById(p+'-clr');
    if(c){bico.src=stockIcon(c[0],skin);bico.style.display='block';blbl.innerHTML=`<strong>${c[1]}</strong> <span style="color:var(--dim);font-size:10px;">skin ${skin}</span>`;clr.style.display='inline';}
    else{bico.style.display='none';blbl.innerHTML='<span class="dim">Seleccionar personaje...</span>';clr.style.display='none';}
    renderSkins(p);
  });
}

loadFromStorage().then(() => {
  document.getElementById('p1-name').value=S.p1tag;
  document.getElementById('p2-name').value=S.p2tag;
  document.getElementById('round-inp').value=S.round;
  document.getElementById('stage-inp').value=S.stage;
  document.getElementById('p1-seed').value=S.p1seed;
  document.getElementById('p2-seed').value=S.p2seed;
  document.querySelectorAll('.fmt-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.f)===S.format));
  render();
});

// Auto-fill player names from stream session
(function pollStream() {
  fetch('/api/session/afk-multi-stream').then(r=>r.ok?r.json():null).then(data=>{
    if (!data || !data.session) return;
    const players = data.session.players || [];
    const n1 = players[0]||'', n2 = players[1]||'';
    if (n1 && n1 !== S.p1tag) { S.p1tag=n1; document.getElementById('p1-name').value=n1; }
    if (n2 && n2 !== S.p2tag) { S.p2tag=n2; document.getElementById('p2-name').value=n2; }
  }).catch(()=>{});
  setTimeout(pollStream, 4000);
})();

document.getElementById('char-modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closePicker();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePicker();});
</script>
</body>
</html>
