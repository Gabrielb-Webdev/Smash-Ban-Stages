<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Overlay 2 · Broadcast</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { overflow: hidden; background: transparent; }
  body {
    width: 1280px; height: 720px;
    background: #111;
    overflow: hidden;
  }

  /* bloques pegados a los bordes inferiores */
  #sb {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0;
    pointer-events: none;
  }

  .player-block {
    width: 340px;
    background: rgba(6,10,20,0.93);
    backdrop-filter: blur(18px);
    position: relative;
    overflow: hidden;
  }

  /* línea color superior */
  .player-block::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, #3a8fc4, #74c4f0, #3a8fc4);
  }

  .block-inner {
    padding: 14px 18px 12px;
  }

  .p-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: rgba(74,163,217,0.45);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .p-tag {
    font-family: 'Anton', sans-serif;
    font-size: 32px;
    letter-spacing: 1px;
    color: #e0eef8;
    line-height: 1;
    text-transform: uppercase;
  }

  .p-detail {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: rgba(74,120,160,0.6);
    margin-top: 5px;
    letter-spacing: 0.5px;
  }

  /* Gradiente lateral que se desvanece hacia el centro */
  .player-block.left {
    background: linear-gradient(90deg, rgba(6,12,24,0.96) 70%, rgba(6,12,24,0.0) 100%);
  }
  .player-block.right {
    background: linear-gradient(270deg, rgba(6,12,24,0.96) 70%, rgba(6,12,24,0.0) 100%);
  }

  .player-block.right .block-inner {
    text-align: right;
  }

  /* Score central */
  .score-block {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 160px;
    background: rgba(4,8,18,0.97);
    text-align: center;
    padding: 10px 16px 12px;
  }

  .score-block::before {
    content: '';
    position: absolute;
    top: 0; left: 12px; right: 12px;
    height: 1px;
    background: rgba(74,163,217,0.3);
  }

  .score-main {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-bottom: 4px;
  }

  .sn {
    font-family: 'Anton', sans-serif;
    font-size: 42px;
    color: rgba(180,215,235,0.7);
    line-height: 1;
    min-width: 28px;
  }
  .sn.lead { color: #80c8f0; }

  .sdash {
    font-family: 'Anton', sans-serif;
    font-size: 24px;
    color: rgba(50,90,120,0.4);
    line-height: 1;
  }

  .score-round {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: rgba(74,163,217,0.35);
    text-transform: uppercase;
  }

  /* pips */
  .pips {
    display: flex;
    gap: 4px;
    margin-top: 4px;
  }
  .player-block.right .pips { justify-content: flex-end; }

  .pip { width: 18px; height: 3px; background: rgba(74,163,217,0.5); }
  .pip.e { background: rgba(255,255,255,0.06); }

  /* char icon */
  .char-icon {
    position: absolute;
    top: 12px;
    width: 38px; height: 38px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(116,172,223,0.25);
    display: none;
    background: rgba(0,0,10,0.5);
  }
  .player-block.left .char-icon { right: 16px; }
  .player-block.right .char-icon { left: 16px; }

  /* flag arg */
  .arg-flag {
    position: absolute;
    bottom: 14px;
    width: 28px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    opacity: 0.18;
  }
  .player-block.left .arg-flag { right: 24px; }
  .player-block.right .arg-flag { left: 24px; }

  .fl { height: 4px; border-radius: 1px; }
  .fl-s { background: #74acdf; }
  .fl-w { background: #e0eef8; }
</style>
</head>
<body>
<div id="sb">

  <!-- P1 izquierda -->
  <div class="player-block left">
    <img class="char-icon" id="p1-icon" src="" alt="">
    <div class="block-inner">
      <div class="p-label">Player 1</div>
      <div class="p-tag" id="p1-tag">PLAYER1</div>
      <div class="pips" id="p1-pips"></div>
      <div class="p-detail" id="p1-detail">Personaje · Seed #1</div>
    </div>
    <div class="arg-flag">
      <div class="fl fl-s"></div>
      <div class="fl fl-w"></div>
      <div class="fl fl-s"></div>
    </div>
  </div>

  <!-- Score centro -->
  <div class="score-block">
    <div class="score-main">
      <div class="sn" id="s1">0</div>
      <div class="sdash">—</div>
      <div class="sn" id="s2">0</div>
    </div>
    <div class="score-round" id="round-el">Winners Finals</div>
  </div>

  <!-- P2 derecha -->
  <div class="player-block right">
    <img class="char-icon" id="p2-icon" src="" alt="">
    <div class="block-inner">
      <div class="p-label">Player 2</div>
      <div class="p-tag" id="p2-tag">PLAYER2</div>
      <div class="pips" id="p2-pips"></div>
      <div class="p-detail" id="p2-detail">Personaje · Seed #2</div>
    </div>
    <div class="arg-flag">
      <div class="fl fl-s"></div>
      <div class="fl fl-w"></div>
      <div class="fl fl-s"></div>
    </div>
  </div>

</div>

<script>
  !function(){function s(){var r=Math.min(window.innerWidth/1280,window.innerHeight/720);document.body.style.transform='scale('+r+')';document.body.style.transformOrigin='top left';}s();window.addEventListener('resize',s);}();

  function load() {
    try {
      const d = JSON.parse(localStorage.getItem('smashafk_score') || '{}');
      const p1s = d.p1score||0, p2s = d.p2score||0, needed = d.needed||3;
      document.getElementById('p1-tag').textContent = (d.p1tag||'PLAYER1').toUpperCase();
      document.getElementById('p2-tag').textContent = (d.p2tag||'PLAYER2').toUpperCase();
      document.getElementById('p1-detail').textContent = [d.p1char, d.p1seed].filter(Boolean).join(' · ');
      document.getElementById('p2-detail').textContent = [d.p2char, d.p2seed].filter(Boolean).join(' · ');
      document.getElementById('s1').textContent = p1s;
      document.getElementById('s2').textContent = p2s;
      document.getElementById('s1').className = 'sn'+(p1s>p2s?' lead':'');
      document.getElementById('s2').className = 'sn'+(p2s>p1s?' lead':'');
      document.getElementById('round-el').textContent = d.round||'Winners Finals';
      function pips(id, score) {
        const el = document.getElementById(id); el.innerHTML = '';
        for(let i=0;i<needed;i++){const p=document.createElement('div'); p.className='pip'+(i<score?'':' e'); el.appendChild(p);}
      }
      pips('p1-pips',p1s); pips('p2-pips',p2s);
      function setIcon(id, url) { const el=document.getElementById(id); el.src=url||''; el.style.display=url?'block':'none'; }
      setIcon('p1-icon', d.p1charIcon); setIcon('p2-icon', d.p2charIcon);
    } catch(e){}
  }
  load(); setInterval(load,300); window.addEventListener('storage',load);
</script>
</body>
</html>
