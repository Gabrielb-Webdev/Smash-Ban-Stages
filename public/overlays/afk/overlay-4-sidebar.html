<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Overlay 4 · Sidebar</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { overflow: hidden; background: transparent; }
  body {
    width: 1280px; height: 720px;
    background: #111826;
    overflow: hidden;
  }

  #sb {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 210px;
    background: rgba(4,9,20,0.9);
    backdrop-filter: blur(18px);
    border-right: 1px solid rgba(255,255,255,0.05);
    display: flex;
    flex-direction: column;
  }

  /* Header logo */
  .sb-header {
    padding: 16px 16px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .flag-v {
    display: flex;
    flex-direction: column;
    gap: 2px;
    width: 16px;
    opacity: 0.5;
  }
  .fv { height: 3px; border-radius: 0.5px; }
  .fv-sky { background: #74acdf; }
  .fv-w { background: #c8dff0; }

  .sb-title {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    color: rgba(180,215,240,0.7);
    text-transform: uppercase;
  }
  .sb-title span { color: rgba(74,163,217,0.8); }

  /* Round label */
  .sb-round {
    padding: 8px 16px 0;
  }
  .round-lbl {
    font-family: 'Barlow', sans-serif;
    font-size: 8px;
    letter-spacing: 2.5px;
    color: rgba(74,163,217,0.35);
    text-transform: uppercase;
  }
  .round-val {
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    font-weight: 400;
    color: rgba(140,185,220,0.7);
    letter-spacing: 1px;
    margin-top: 2px;
    text-transform: uppercase;
  }

  /* Score display central */
  .sb-score {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    padding: 8px 0;
    position: relative;
  }

  .score-vs-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .big-score {
    font-family: 'Oswald', sans-serif;
    font-size: 56px;
    font-weight: 700;
    line-height: 1;
    color: rgba(150,200,230,0.55);
    min-width: 36px;
    text-align: center;
  }
  .big-score.lead { color: rgba(100,190,235,0.95); }

  .vs-line {
    width: 1px;
    height: 50px;
    background: rgba(74,163,217,0.15);
  }

  /* Bloques jugador vertical */
  .p-block {
    width: 100%;
    padding: 0 16px 12px;
    position: relative;
  }

  .p-lbl {
    font-size: 8px;
    letter-spacing: 2.5px;
    color: rgba(74,163,217,0.3);
    text-transform: uppercase;
    font-family: 'Barlow', sans-serif;
    margin-bottom: 3px;
  }

  .p-tag {
    font-family: 'Oswald', sans-serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 1px;
    color: rgba(210,230,248,0.85);
    text-transform: uppercase;
    line-height: 1;
  }
  .p-tag.lead { color: rgba(100,185,230,1); }

  .p-char {
    font-family: 'Barlow', sans-serif;
    font-size: 10px;
    color: rgba(74,120,160,0.55);
    margin-top: 2px;
  }

  /* pips horizontales */
  .pips {
    display: flex;
    gap: 4px;
    margin-top: 6px;
  }

  .pip { width: 100%; max-width: 20px; height: 3px; border-radius: 1px; background: rgba(74,163,217,0.4); }
  .pip.e { background: rgba(255,255,255,0.06); }

  .divider {
    height: 1px;
    background: rgba(255,255,255,0.04);
    margin: 0 16px;
  }

  /* Bottom: stage */
  .sb-stage {
    padding: 10px 16px 14px;
    border-top: 1px solid rgba(255,255,255,0.04);
    margin-top: auto;
  }

  .stage-lbl {
    font-size: 8px;
    letter-spacing: 2px;
    color: rgba(74,163,217,0.3);
    text-transform: uppercase;
    font-family: 'Barlow', sans-serif;
    margin-bottom: 2px;
  }

  .stage-val {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: rgba(100,140,175,0.6);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .char-icon {
    width: 30px; height: 30px;
    border-radius: 50%;
    object-fit: cover;
    border: 1.5px solid rgba(116,172,223,0.3);
    flex-shrink: 0;
    display: none;
    background: rgba(0,0,10,0.5);
  }
  .ptag-row { display: flex; align-items: center; gap: 7px; }
</style>
</head>
<body>
<div id="sb">

  <div class="sb-header">
    <div class="flag-v">
      <div class="fv fv-sky"></div>
      <div class="fv fv-w"></div>
      <div class="fv fv-sky"></div>
    </div>
    <div class="sb-title">Smash <span>AFK</span></div>
  </div>

  <div class="sb-round" style="padding-top:14px; padding-bottom: 8px;">
    <div class="round-lbl">Ronda</div>
    <div class="round-val" id="round-el">Winners Finals</div>
  </div>

  <div class="sb-score">

    <!-- P1 -->
    <div class="p-block">
      <div class="p-lbl">Jugador 1</div>
      <div class="ptag-row">
        <img class="char-icon" id="p1-icon" src="" alt="">
        <div>
          <div class="p-tag" id="p1-tag">PLAYER1</div>
          <div class="p-char" id="p1-char">Personaje</div>
        </div>
      </div>
      <div class="pips" id="p1-pips"></div>
    </div>

    <div class="divider"></div>

    <!-- Score -->
    <div class="score-vs-row" style="margin-top:14px;">
      <div class="big-score" id="s1">0</div>
      <div class="vs-line"></div>
      <div class="big-score" id="s2">0</div>
    </div>

    <div class="divider"></div>

    <!-- P2 -->
    <div class="p-block" style="padding-top:12px;">
      <div class="p-lbl">Jugador 2</div>
      <div class="ptag-row">
        <img class="char-icon" id="p2-icon" src="" alt="">
        <div>
          <div class="p-tag" id="p2-tag">PLAYER2</div>
          <div class="p-char" id="p2-char">Personaje</div>
        </div>
      </div>
      <div class="pips" id="p2-pips"></div>
    </div>

  </div>

  <div class="sb-stage">
    <div class="stage-lbl">Escenario</div>
    <div class="stage-val" id="stage-el">Final Destination</div>
  </div>

</div>

<script>
  !function(){function s(){var r=Math.min(window.innerWidth/1280,window.innerHeight/720);document.body.style.transform='scale('+r+')';document.body.style.transformOrigin='top left';}s();window.addEventListener('resize',s);}();

  function load() {
    try {
      const d = JSON.parse(localStorage.getItem('smashafk_score')||'{}');
      const p1s=d.p1score||0, p2s=d.p2score||0, needed=d.needed||3;
      document.getElementById('p1-tag').textContent=(d.p1tag||'PLAYER1').toUpperCase();
      document.getElementById('p2-tag').textContent=(d.p2tag||'PLAYER2').toUpperCase();
      document.getElementById('p1-char').textContent=d.p1char||'';
      document.getElementById('p2-char').textContent=d.p2char||'';
      document.getElementById('s1').textContent=p1s;
      document.getElementById('s2').textContent=p2s;
      document.getElementById('s1').className='big-score'+(p1s>p2s?' lead':'');
      document.getElementById('s2').className='big-score'+(p2s>p1s?' lead':'');
      document.getElementById('p1-tag').className='p-tag'+(p1s>p2s?' lead':'');
      document.getElementById('p2-tag').className='p-tag'+(p2s>p1s?' lead':'');
      document.getElementById('round-el').textContent=d.round||'Winners Finals';
      document.getElementById('stage-el').textContent=d.stage||'Final Destination';
      function pips(id,score){
        const el=document.getElementById(id); el.innerHTML='';
        for(let i=0;i<needed;i++){const p=document.createElement('div'); p.className='pip'+(i<score?'':' e'); el.appendChild(p);}
      }
      pips('p1-pips',p1s); pips('p2-pips',p2s);
      function setIcon(id, url) { const el=document.getElementById(id); el.src=url||''; el.style.display=url?'block':'none'; }
      setIcon('p1-icon', d.p1charIcon); setIcon('p2-icon', d.p2charIcon);
    }catch(e){}
  }
  load(); setInterval(load,300); window.addEventListener('storage',load);
</script>
</body>
</html>
