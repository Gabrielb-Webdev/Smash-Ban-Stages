<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Overlay 5 · Glass Pill</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { overflow: hidden; background: transparent; }
  body {
    width: 1280px; height: 720px;
    background: #10131e;
    overflow: hidden;
  }

  #sb {
    position: absolute;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  /* Pill principal */
  .pill {
    display: flex;
    align-items: center;
    background: rgba(8,13,26,0.82);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 100px;
    padding: 6px 6px 6px 20px;
    gap: 0;
    min-width: 560px;
    position: relative;
    overflow: hidden;
  }

  /* glow top sutil */
  .pill::before {
    content: '';
    position: absolute;
    top: 0; left: 30%; right: 30%;
    height: 1px;
    background: rgba(116,172,223,0.35);
  }

  /* P1 info */
  .p-info {
    flex: 1;
    min-width: 0;
  }

  .p-info.right {
    text-align: right;
  }

  .p-tag {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 17px;
    letter-spacing: 0.5px;
    color: rgba(210,232,248,0.88);
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1;
  }
  .p-tag.lead { color: rgba(106,186,232,1); }

  .p-char {
    font-family: 'Barlow', sans-serif;
    font-size: 9px;
    color: rgba(74,120,160,0.5);
    letter-spacing: 1px;
    margin-top: 2px;
    text-transform: uppercase;
  }

  /* Score capsule central */
  .score-cap {
    background: rgba(4,8,18,0.9);
    border: 1px solid rgba(74,163,217,0.15);
    border-radius: 100px;
    padding: 6px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    margin: 0 16px;
  }

  .sc-num {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 26px;
    line-height: 1;
    color: rgba(140,190,225,0.6);
    min-width: 18px;
    text-align: center;
  }
  .sc-num.lead { color: rgba(90,180,235,1); }

  .sc-dot {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    color: rgba(50,90,120,0.4);
    font-weight: 400;
  }

  /* pips row bajo la pill */
  .pips-row {
    display: flex;
    align-items: center;
    gap: 20px;
    justify-content: center;
  }

  .side-pips {
    display: flex;
    gap: 4px;
  }

  .pip {
    width: 14px;
    height: 3px;
    border-radius: 2px;
    background: rgba(74,163,217,0.45);
  }
  .pip.e { background: rgba(255,255,255,0.06); }

  .info-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(5,10,22,0.7);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 100px;
    padding: 4px 14px;
  }

  .chip-txt {
    font-family: 'Barlow', sans-serif;
    font-size: 9px;
    letter-spacing: 2px;
    color: rgba(74,163,217,0.35);
    text-transform: uppercase;
  }

  .chip-sep { width: 1px; height: 8px; background: rgba(255,255,255,0.06); }

  /* Argentina flag inline mini */
  .flag-tiny {
    display: flex;
    flex-direction: column;
    gap: 1.5px;
    width: 14px;
    opacity: 0.4;
    flex-shrink: 0;
  }
  .ft { height: 2.5px; border-radius: 0.5px; }
  .ft-sky { background: #74acdf; }
  .ft-w { background: #c8e0f2; }

  /* Padding lateral en pill para los tags */
  .pill-left-pad { padding-left: 20px; }
  .pill-right-pad { padding-right: 20px; }

  .char-icon {
    width: 28px; height: 28px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid rgba(116,172,223,0.25);
    flex-shrink: 0;
    display: none;
    background: rgba(0,0,10,0.5);
  }
</style>
</head>
<body>
<div id="sb">

  <div class="pill">
    <!-- P1 -->
    <div class="flag-tiny" id="p1-flag">
      <div class="ft ft-sky"></div>
      <div class="ft ft-w"></div>
      <div class="ft ft-sky"></div>
    </div>
    <img class="char-icon" id="p1-icon" src="" alt="">
    <div style="width:8px;"></div>
    <div class="p-info">
      <div class="p-tag" id="p1-tag">PLAYER1</div>
      <div class="p-char" id="p1-char">Personaje</div>
    </div>

    <!-- Score -->
    <div class="score-cap">
      <div class="sc-num" id="s1">0</div>
      <div class="sc-dot">:</div>
      <div class="sc-num" id="s2">0</div>
    </div>

    <!-- P2 -->
    <div class="p-info right">
      <div class="p-tag" id="p2-tag">PLAYER2</div>
      <div class="p-char" id="p2-char">Personaje</div>
    </div>
    <div style="width:8px;"></div>
    <img class="char-icon" id="p2-icon" src="" alt="">
    <div class="flag-tiny" id="p2-flag">
      <div class="ft ft-sky"></div>
      <div class="ft ft-w"></div>
      <div class="ft ft-sky"></div>
    </div>
  </div>

  <!-- Row info + pips -->
  <div class="pips-row">
    <div class="side-pips" id="p1-pips"></div>

    <div class="info-chip">
      <div class="chip-txt" id="round-el">Winners Finals</div>
      <div class="chip-sep"></div>
      <div class="chip-txt" id="stage-el">Final Destination</div>
      <div class="chip-sep"></div>
      <div class="chip-txt" id="game-el">G1 · Bo5</div>
    </div>

    <div class="side-pips" id="p2-pips"></div>
  </div>

</div>

<script>
  !function(){function s(){var r=Math.min(window.innerWidth/1280,window.innerHeight/720);document.body.style.transform='scale('+r+')';document.body.style.transformOrigin='top left';}s();window.addEventListener('resize',s);}();

  function load() {
    try {
      const d = JSON.parse(localStorage.getItem('smashafk_score')||'{}');
      const p1s=d.p1score||0, p2s=d.p2score||0, needed=d.needed||3;
      document.getElementById('p1-tag').textContent=(d.p1tag||'PLAYER1').toUpperCase();
      document.getElementById('p2-tag').textContent=(d.p2tag||'PLAYER2').toUpperCase();
      document.getElementById('p1-char').textContent=d.p1char||'';
      document.getElementById('p2-char').textContent=d.p2char||'';
      document.getElementById('s1').textContent=p1s;
      document.getElementById('s2').textContent=p2s;
      document.getElementById('s1').className='sc-num'+(p1s>p2s?' lead':'');
      document.getElementById('s2').className='sc-num'+(p2s>p1s?' lead':'');
      document.getElementById('p1-tag').className='p-tag'+(p1s>p2s?' lead':'');
      document.getElementById('p2-tag').className='p-tag'+(p2s>p1s?' lead':'');
      document.getElementById('round-el').textContent=d.round||'Winners Finals';
      document.getElementById('stage-el').textContent=d.stage||'Final Destination';
      document.getElementById('game-el').textContent='G'+(Math.min(p1s+p2s+1,d.format||5))+' · Bo'+(d.format||5);
      function pips(id,score){
        const el=document.getElementById(id); el.innerHTML='';
        for(let i=0;i<needed;i++){const p=document.createElement('div'); p.className='pip'+(i<score?'':' e'); el.appendChild(p);}
      }
      pips('p1-pips',p1s); pips('p2-pips',p2s);
      function setIcon(iconId, flagId, url) {
        const ic=document.getElementById(iconId), fl=document.getElementById(flagId);
        ic.src=url||''; ic.style.display=url?'inline-block':'none';
        fl.style.display=url?'none':'flex';
      }
      setIcon('p1-icon','p1-flag',d.p1charIcon); setIcon('p2-icon','p2-flag',d.p2charIcon);
    }catch(e){}
  }
  load(); setInterval(load,300); window.addEventListener('storage',load);
</script>
</body>
</html>
