<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arena Warui – Panel de Control</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Orbitron:wght@700;900&family=Exo+2:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --purple-deep: #1a0d2e;
    --purple-bright: #7b2fff;
    --magenta: #e91e8c;
    --cyan: #00e5ff;
    --gold: #f5a623;
    --black: #07020f;
    --white: #f0eaff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(135deg, #0d0820 0%, #1a0535 50%, #090514 100%);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 20px;
  }

  .controls {
    width: 620px;
    padding: 28px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(123,47,255,0.3);
    border-radius: 12px;
  }

  .controls h2 {
    font-family: 'Orbitron', monospace;
    color: var(--gold);
    font-size: 16px;
    letter-spacing: 3px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .subtitle {
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    color: var(--white);
    opacity: 0.4;
    letter-spacing: 1px;
    margin-bottom: 24px;
  }

  .ctrl-row { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
  .ctrl-label { font-family: 'Rajdhani', sans-serif; font-size: 13px; color: var(--white); opacity: 0.7; letter-spacing: 1px; min-width: 120px; }

  input[type="text"] {
    background: rgba(123,47,255,0.15);
    border: 1px solid rgba(123,47,255,0.5);
    color: var(--white);
    font-family: 'Exo 2', sans-serif;
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 6px;
    outline: none;
    width: 180px;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--cyan); box-shadow: 0 0 8px rgba(0,229,255,0.3); }

  select {
    background: rgba(123,47,255,0.15);
    border: 1px solid rgba(123,47,255,0.5);
    color: var(--white);
    font-family: 'Exo 2', sans-serif;
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 6px;
    outline: none;
    cursor: pointer;
  }
  select option { background: #1a0d2e; color: var(--white); }
  select optgroup { background: #0d0820; color: var(--purple-bright); font-style: normal; font-size: 11px; }

  .btn {
    padding: 6px 16px;
    border: none;
    border-radius: 6px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-score {
    background: linear-gradient(135deg, var(--purple-bright), var(--magenta));
    color: white;
    padding: 6px 12px;
    font-size: 16px;
  }
  .btn-score:hover { transform: scale(1.08); box-shadow: 0 0 14px var(--magenta); }
  .btn-reset { background: rgba(233,30,140,0.2); color: var(--magenta); border: 1px solid var(--magenta); }
  .btn-reset:hover { background: var(--magenta); color: white; }

  .score-ctrl { display: flex; align-items: center; gap: 8px; }
  .score-val {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    color: var(--white);
    min-width: 28px;
    text-align: center;
  }

  .divider { border: none; border-top: 1px solid rgba(123,47,255,0.2); margin: 12px 0; }

  .status {
    margin-top: 20px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    color: var(--cyan);
    opacity: 0.6;
    letter-spacing: 1px;
    text-align: center;
  }
</style>
</head>

<script>
  const API  = 'https://smash-ban-stages.vercel.app/api/warui/stream-state';
  const AUTH = 'Bearer afk-admin-2025';
  let sc = [0, 0];

  function setStatus(text, ok = true) {
    const msg = document.getElementById('status-msg');
    msg.textContent = text;
    msg.style.color = ok ? 'var(--cyan)' : 'var(--magenta)';
    msg.style.opacity = '1';
    if (ok) setTimeout(() => { msg.textContent = 'Listo ✓'; msg.style.opacity = '0.6'; msg.style.color = 'var(--cyan)'; }, 1500);
  }

  function getPlayerName(tag, sponsor) {
    const t = tag.trim(), s = sponsor.trim();
    return s ? `${s} | ${t}` : t;
  }

  function update() {
    const p1 = document.getElementById('in-p1').value.trim();
    const sp1 = document.getElementById('in-sp1').value.trim();
    const p2 = document.getElementById('in-p2').value.trim();
    const sp2 = document.getElementById('in-sp2').value.trim();
    const bestof = document.getElementById('in-bestof').value;
    const round  = document.getElementById('in-round').value;
    fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': AUTH },
      body: JSON.stringify({
        player1: getPlayerName(p1, sp1),
        player2: getPlayerName(p2, sp2),
        format: bestof, round, sessionId: ''
      }),
    })
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(() => setStatus('✓ Sincronizado'))
      .catch(() => setStatus('✗ Error de conexión', false));
  }

  function adjustScore(player, delta) {
    sc[player - 1] = Math.max(0, sc[player - 1] + delta);
    document.getElementById('ctrl-s' + player).textContent = sc[player - 1];
    fetch(API, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'Authorization': AUTH },
      body: JSON.stringify({ score1: sc[0], score2: sc[1] }),
    })
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(() => setStatus('✓ Sincronizado'))
      .catch(() => setStatus('✗ Error de conexión', false));
  }
  function updateChar() {
    const char1 = document.getElementById('in-char1').value;
    const char2 = document.getElementById('in-char2').value;
    fetch(API, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'Authorization': AUTH },
      body: JSON.stringify({ char1, char2 }),
    })
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(() => setStatus('\u2713 Personajes actualizados'))
      .catch(() => setStatus('\u2717 Error de conexi\u00f3n', false));
  }
  function resetScores() {
    sc = [0, 0];
    document.getElementById('ctrl-s1').textContent = 0;
    document.getElementById('ctrl-s2').textContent = 0;
    fetch(API, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'Authorization': AUTH },
      body: JSON.stringify({ score1: 0, score2: 0 }),
    })
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(() => setStatus('✓ Scores reseteados'))
      .catch(() => setStatus('✗ Error de conexión', false));
  }

  // Cargar estado actual al abrir
  fetch(API)
    .then(r => r.ok ? r.json() : null)
    .then(d => {
      if (!d || d.empty) { setStatus('Listo ✓'); return; }
      document.getElementById('in-p1').value  = d.player1?.tag || '';
      document.getElementById('in-sp1').value = d.player1?.sponsor || '';
      document.getElementById('in-p2').value  = d.player2?.tag || '';
      document.getElementById('in-sp2').value = d.player2?.sponsor || '';
      sc[0] = d.score1 ?? 0;
      sc[1] = d.score2 ?? 0;
      document.getElementById('ctrl-s1').textContent = sc[0];
      document.getElementById('ctrl-s2').textContent = sc[1];
      const c1 = document.getElementById('in-char1');
      const c2 = document.getElementById('in-char2');
      if (d.char1) { for (const o of c1.options) { if (o.value === d.char1) { c1.value = d.char1; break; } } }
      if (d.char2) { for (const o of c2.options) { if (o.value === d.char2) { c2.value = d.char2; break; } } }
      const bf = document.getElementById('in-bestof');
      const rd = document.getElementById('in-round');
      if (d.format) { for (const o of bf.options) { if (o.value === d.format) { bf.value = d.format; break; } } }
      if (d.round)  { for (const o of rd.options) { if (o.value.toUpperCase() === d.round.toUpperCase()) { rd.value = o.value; break; } } }
      setStatus('Listo ✓');
    })
    .catch(() => setStatus('✗ Sin conexión', false));
</script>
