<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arena Warui – Scoreboard Overlay</title>
<script>
(function() {
  function scaleOverlay() {
    var el = document.querySelector('.overlay');
    if (!el) return;
    var s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
    el.style.transform = 'scale(' + s + ')';
    el.style.transformOrigin = 'center center';
    el.style.visibility = 'visible';
  }
  document.addEventListener('DOMContentLoaded', scaleOverlay);
  window.addEventListener('resize', scaleOverlay);
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Orbitron:wght@700;900&family=Exo+2:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --purple-deep: #1a0d2e;
    --purple-mid: #3d1c6e;
    --purple-bright: #7b2fff;
    --magenta: #e91e8c;
    --cyan: #00e5ff;
    --gold: #f5a623;
    --gold-light: #ffd166;
    --black: #07020f;
    --white: #f0eaff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    /*background: #07020f;*/
    font-family: 'Exo 2', sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .overlay {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    position: relative;
    user-select: none;
    flex-shrink: 0;
    visibility: hidden;
  }

  /* ── TOP BAR ── */
  .top-bar {
    display: flex;
    align-items: stretch;
    height: 180px;
    position: relative;
    filter: drop-shadow(0 0 18px rgba(0,229,255,0.25));
  }

  /* Player panels */
  .player {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    padding: 0 26px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, var(--black) 0%, var(--purple-deep) 60%, #2a0d50 100%);
    clip-path: polygon(0 0, calc(100% - 26px) 0, 100% 100%, 0 100%);
  }

  .player.right {
    flex-direction: row-reverse;
    clip-path: polygon(26px 0, 100% 0, 100% 100%, 0 100%);
    background: linear-gradient(225deg, var(--black) 0%, var(--purple-deep) 60%, #2a0d50 100%);
  }

  /* Animated scan line */
  .player::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    animation: scan 3s linear infinite;
  }
  .player.right::before { animation-delay: 1.5s; }
  @keyframes scan { to { left: 200%; } }

  /* Corner accent lines */
  .player::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px; height: 100%;
    background: linear-gradient(to bottom, var(--magenta), var(--purple-bright));
    box-shadow: 0 0 12px var(--magenta);
  }
  .player.right::after { left: auto; right: 0; background: linear-gradient(to bottom, var(--cyan), var(--purple-bright)); box-shadow: 0 0 12px var(--cyan); }

  .player-tag {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 44px;
    color: var(--white);
    letter-spacing: 3px;
    text-transform: uppercase;
    text-shadow: 0 0 20px rgba(233,30,140,0.6), 0 0 40px rgba(123,47,255,0.4);
  }
  .player.right .player-tag { text-align: right; }

  .player-sponsor {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.85;
  }

  .player-info { display: flex; flex-direction: column; gap: 2px; }
  .player.right .player-info { align-items: flex-end; }

  /* ── SCORE BOXES (fuera de los paneles) ── */
  .score-box {
    width: 160px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, #0d0820 0%, var(--purple-deep) 100%);
    position: relative;
    z-index: 5;
  }
  .score-box.left {
    border-left: 3px solid var(--magenta);
    border-top: 2px solid rgba(123,47,255,0.5);
    box-shadow: inset 0 0 20px rgba(233,30,140,0.15);
  }
  .score-box.right {
    border-right: 3px solid var(--cyan);
    border-top: 2px solid rgba(123,47,255,0.5);
    box-shadow: inset 0 0 20px rgba(0,229,255,0.15);
  }
  .score-num {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 100px;
    color: var(--white);
    line-height: 1;
    text-shadow: 0 0 20px var(--cyan), 0 0 40px rgba(0,229,255,0.4);
    transition: color 0.6s;
  }

  /* ── PERSONAJE del jugador ── */
  .player-char {
    width: 110px;
    height: 110px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    border: 2px solid rgba(123,47,255,0.5);
    background: rgba(123,47,255,0.1);
    overflow: hidden;
  }
  .player-char img { width: 100%; height: 100%; object-fit: contain; }
  .player-char.empty { border-style: dashed; opacity: 0.3; }

  /* ── CENTER BLOCK (logo circular) ── */
  .center {
    width: 200px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, #0d0820 0%, var(--purple-deep) 100%);
    border-left: 2px solid var(--purple-bright);
    border-right: 2px solid var(--purple-bright);
    box-shadow: inset 0 0 30px rgba(123,47,255,0.3);
    position: relative;
    overflow: hidden;
  }
  .center::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 8px, rgba(123,47,255,0.04) 8px, rgba(123,47,255,0.04) 9px),
      repeating-linear-gradient(90deg, transparent, transparent 8px, rgba(123,47,255,0.04) 8px, rgba(123,47,255,0.04) 9px);
  }

  .logo-circle {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid var(--purple-bright);
    box-shadow: 0 0 18px var(--purple-bright), 0 0 36px rgba(123,47,255,0.4);
    animation: logo-glow 3s ease-in-out infinite;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }
  .logo-circle img { width: 100%; height: 100%; object-fit: cover; }
  @keyframes logo-glow {
    0%, 100% { box-shadow: 0 0 18px var(--purple-bright), 0 0 36px rgba(123,47,255,0.4); border-color: var(--purple-bright); }
    50%      { box-shadow: 0 0 24px var(--magenta), 0 0 48px rgba(233,30,140,0.5);     border-color: var(--magenta); }
  }

  /* ── BOTTOM INFO STRIP ── */
  .info-strip {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    margin-top: 4px;
    background: linear-gradient(90deg, rgba(233,30,140,0.15) 0%, rgba(13,8,32,0.95) 30%, rgba(13,8,32,0.95) 70%, rgba(0,229,255,0.12) 100%);
    border: 1px solid rgba(123,47,255,0.4);
    border-top: 2px solid var(--purple-bright);
    padding: 0 30px;
    position: relative;
    overflow: hidden;
  }

  .info-strip::before {
    content: '';
    position: absolute;
    top: 50%; left: -100%;
    width: 40%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(245,166,35,0.5), transparent);
    animation: scan 4s linear infinite 2s;
  }

  .strip-text {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .strip-bestof { color: var(--gold); }
  .strip-event  { color: var(--white); opacity: 0.9; position: absolute; left: 50%; transform: translateX(-50%); }
  .strip-round  { color: var(--cyan); text-shadow: 0 0 8px var(--cyan); }

  /* Hex decorations */
  .hex-deco {
    position: absolute;
    right: 160px;
    top: 50%;
    transform: translateY(-50%);
    display: flex; gap: 5px;
  }
  .hex {
    width: 8px; height: 8px;
    background: var(--purple-bright);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    opacity: 0.6;
  }
  .hex:nth-child(2) { background: var(--magenta); opacity: 0.8; }
  .hex:nth-child(3) { background: var(--cyan); }


  /* ── BOTTOM LOGO ── */
  .bottom-logo {
    display: flex;
    justify-content: center;
    margin-top: 8px;
  }
  .bottom-logo img {
    height: 36px;
    width: auto;
    opacity: 0.85;
    filter: drop-shadow(0 0 8px rgba(123,47,255,0.5));
  }

  /* ── PIXEL LOGO ── */
  .pixel-logo-wrap {
    display: flex;
    justify-content: center;
    margin-top: 20px;
  }
  .pixel-logo {
    height: 120px;
    width: auto;
    animation: pixel-pulse 12s ease-in-out infinite;
    filter: drop-shadow(0 0 14px rgba(123,47,255,0.7));
    border-radius: 10px;
  }
  @keyframes pixel-pulse {
    0%, 5%   { opacity: 0; transform: scale(0.85); }
    20%, 80% { opacity: 1; transform: scale(1); }
    95%, 100%{ opacity: 0; transform: scale(0.85); }
  }

  /* ── GLOW PULSE ANIM ── */
  @keyframes glow-pulse {
    0%, 100% { box-shadow: 0 0 20px rgba(233,30,140,0.3); }
    50% { box-shadow: 0 0 40px rgba(233,30,140,0.7), 0 0 60px rgba(123,47,255,0.4); }
  }
  .top-bar { animation: glow-pulse 4s ease-in-out infinite; }
</style>
</head>
<body>

<div class="overlay">

  <!-- ══ TOP BAR ══ -->
  <div class="top-bar">

    <!-- SCORE P1 (izquierda, fuera del panel) -->
    <div class="score-box left">
      <span class="score-num" id="s1">0</span>
    </div>

    <!-- Player 1 -->
    <div class="player" id="panel-p1">
      <div class="player-info">
        <div class="player-tag" id="display-p1">JUGADOR 1</div>
        <div class="player-sponsor" id="display-sp1"></div>
      </div>
      <div class="player-char empty" id="char-wrap-1">
        <img id="char-img-1" src="" alt="" style="display:none">
      </div>
    </div>

    <!-- Center (logo) -->
    <div class="center">
      <div class="logo-circle">
        <img src="img/logo.png" alt="Warui Team">
      </div>
    </div>

    <!-- Player 2 -->
    <div class="player right" id="panel-p2">
      <div class="player-info">
        <div class="player-tag" id="display-p2">JUGADOR 2</div>
        <div class="player-sponsor" id="display-sp2"></div>
      </div>
      <div class="player-char empty" id="char-wrap-2">
        <img id="char-img-2" src="" alt="" style="display:none">
      </div>
    </div>

    <!-- SCORE P2 (derecha, fuera del panel) -->
    <div class="score-box right">
      <span class="score-num" id="s2">0</span>
    </div>

  </div>

  <!-- ══ INFO STRIP ══ -->
  <div class="info-strip">
    <span class="strip-text strip-bestof" id="display-bestof">BEST OF 3</span>
    <span class="strip-text strip-event">⚔ ARENA WARUI</span>
    <span class="strip-text strip-round" id="display-round">WINNERS QUARTERS</span>
  </div>

  <!-- ══ PIXEL LOGO ══ -->
  <div class="pixel-logo-wrap">
    <img src="img/Pixel_logo.png" class="pixel-logo" alt="Arena Warui">
  </div>

</div>

<script>
  const BASE = 'https://smash-ban-stages.vercel.app';
  const API = BASE + '/api/warui/stream-state';
  let lastUpdatedAt = null;
  let current = { score1: 0, score2: 0 };

  function setChar(n, filename) {
    const wrap = document.getElementById('char-wrap-' + n);
    const img  = document.getElementById('char-img-' + n);
    if (filename) {
      if (filename.startsWith('Stock Icons V2/')) {
        img.src = BASE + '/images/Stock%20Icons%20V2/' + filename.split('/').slice(-2).map(encodeURIComponent).join('/');
      } else {
        img.src = BASE + '/images/characters/' + encodeURIComponent(filename);
      }
      img.style.display = '';
      wrap.classList.remove('empty');
    } else {
      img.style.display = 'none';
      wrap.classList.add('empty');
    }
  }

  function applyState(d) {
    if (!d || d.empty) return;
    document.getElementById('display-p1').textContent  = (d.player1?.tag     || 'JUGADOR 1').toUpperCase();
    document.getElementById('display-sp1').textContent = (d.player1?.sponsor || '').toUpperCase();
    document.getElementById('display-p2').textContent  = (d.player2?.tag     || 'JUGADOR 2').toUpperCase();
    document.getElementById('display-sp2').textContent = (d.player2?.sponsor || '').toUpperCase();
    if (d.score1 !== current.score1) flashScore('s1', d.score1 > current.score1);
    if (d.score2 !== current.score2) flashScore('s2', d.score2 > current.score2);
    document.getElementById('s1').textContent = d.score1 ?? 0;
    document.getElementById('s2').textContent = d.score2 ?? 0;
    document.getElementById('display-bestof').textContent = d.format || 'BEST OF 3';
    document.getElementById('display-round').textContent  = (d.round  || 'WINNERS QUARTERS').toUpperCase();
    setChar(1, d.char1 || '');
    setChar(2, d.char2 || '');
    current = d;
  }

  function flashScore(id, positive) {
    const el = document.getElementById(id);
    el.style.transition = 'none';
    el.style.color = positive ? 'var(--gold)' : 'var(--magenta)';
    setTimeout(() => { el.style.transition = 'color 0.6s'; el.style.color = ''; }, 300);
  }

  // Carga inicial
  fetch(API).then(r => r.json()).then(d => {
    if (!d.empty) { lastUpdatedAt = d.updatedAt; applyState(d); }
  }).catch(() => {});

  // Polling cada 2 segundos
  setInterval(async () => {
    try {
      const d = await fetch(API).then(r => r.json());
      if (!d.empty && d.updatedAt !== lastUpdatedAt) {
        lastUpdatedAt = d.updatedAt;
        applyState(d);
      }
    } catch {}
  }, 2000);
</script>
</body>
</html>
