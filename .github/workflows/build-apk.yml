name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile-app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile-app/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: mobile-app
        run: npm install

      - name: Expo Prebuild (genera proyecto Android nativo)
        working-directory: mobile-app
        run: npx expo prebuild --platform android --clean --no-install

      - name: Build APK (debug con bundle JS empaquetado)
        working-directory: mobile-app/android
        run: ./gradlew assembleDebug -PbundleInDebug=true --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: afk-smash-debug
          path: mobile-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
