name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile-app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar componentes Android SDK (API 35) y aceptar licencias
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Install dependencies
        working-directory: mobile-app
        run: npm install

      - name: Expo Prebuild (genera proyecto Android nativo)
        working-directory: mobile-app
        run: npx expo prebuild --platform android --clean --no-install

      - name: Crear directorio de assets
        working-directory: mobile-app
        run: mkdir -p android/app/src/main/assets

      - name: Bundle JavaScript (empaquetar JS en APK)
        working-directory: mobile-app
        run: npx expo export:embed --platform android --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res/ --dev false

      - name: Build APK
        working-directory: mobile-app/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: afk-smash-debug
          path: mobile-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Leer versión de app.json
        id: appver
        working-directory: mobile-app
        run: echo "VERSION=$(node -p "require('./app.json').expo.version")" >> $GITHUB_OUTPUT

      - name: Renombrar APK para release
        run: cp mobile-app/android/app/build/outputs/apk/debug/app-debug.apk afk-smash.apk

      - name: Publicar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.appver.outputs.VERSION }}
          name: AFK Smash v${{ steps.appver.outputs.VERSION }}
          files: afk-smash.apk
          token: ${{ secrets.GITHUB_TOKEN }}
